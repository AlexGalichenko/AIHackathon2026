    Parameter:
      type: object
      description: Serializer for the Parameter model.
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        template:
          type: integer
          description: Parameter template
        model_type:
          allOf:
          - $ref: '#/components/schemas/ModelType054Enum'
          default: ''
        model_id:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: ID of the target model for this parameter
        data:
          type: string
          description: Parameter Value
          maxLength: 500
          minLength: 1
        data_numeric:
          type: number
          format: double
          nullable: true
        note:
          type: string
          description: Optional note field
          maxLength: 500
        updated:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Timestamp of last update
        updated_by:
          type: integer
          readOnly: true
          nullable: true
          title: Update By
          description: User who last updated this object
        template_detail:
          allOf:
          - $ref: '#/components/schemas/ParameterTemplate'
          readOnly: true
        updated_by_detail:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
          nullable: true
      required:
      - data
      - model_id
      - pk
      - template
      - template_detail
    ParameterTemplate:
      type: object
      description: Serializer for the ParameterTemplate model.
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        name:
          type: string
          description: Parameter Name
          maxLength: 100
        units:
          type: string
          description: Physical units for this parameter
          maxLength: 25
        description:
          type: string
          description: Parameter description
          maxLength: 250
        model_type:
          nullable: true
          default: ''
          oneOf:
          - $ref: '#/components/schemas/ModelType054Enum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        checkbox:
          type: boolean
          description: Is this parameter a checkbox?
        choices:
          type: string
          description: Valid choices for this parameter (comma-separated)
          maxLength: 5000
        selectionlist:
          type: integer
          nullable: true
          title: Selection List
          description: Selection list for this parameter
        enabled:
          type: boolean
          description: Is this parameter template enabled?
      required:
      - name
      - pk
    Part:
      type: object
      description: |-
        Serializer for complete detail information of a part.

        Used when displaying all details of a single component.
      properties:
        active:
          type: boolean
          description: Is this part active?
        assembly:
          type: boolean
          description: Can this part be built from other parts?
        barcode_hash:
          type: string
          readOnly: true
          description: Unique hash of barcode data
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          readOnly: true
        component:
          type: boolean
          description: Can this part be used to build other parts?
        creation_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        creation_user:
          type: integer
          nullable: true
        default_expiry:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Expiry time (in days) for stock items of this part
        default_location:
          type: integer
          nullable: true
          description: Where is this item normally stored?
        description:
          type: string
          description: Part description (optional)
          maxLength: 250
        full_name:
          type: string
          description: Format a 'full name' for this Part based on the format PART_NAME_FORMAT
            defined in InvenTree settings.
          readOnly: true
        image:
          type: string
          format: uri
          nullable: true
        remote_image:
          type: string
          format: uri
          writeOnly: true
          description: URL of remote image file
        existing_image:
          type: string
          writeOnly: true
          description: Filename of an existing part image
        IPN:
          type: string
          default: ''
          maxLength: 100
        is_template:
          type: boolean
          description: Is this part a template part?
        keywords:
          type: string
          nullable: true
          description: Part keywords to improve visibility in search results
          maxLength: 250
        link:
          type: string
          format: uri
          nullable: true
          description: Link to external URL
          maxLength: 2000
