openapi: 3.0.3
info:
  title: InvenTree API
  version: '479'
  description: API for InvenTree - the intuitive open source inventory management
    system
  license:
    name: MIT
    url: https://github.com/inventree/InvenTree/blob/master/LICENSE
paths:
  /api/part/:
    get:
      operationId: part_list
      description: Override the GET method to determine export options.
      parameters:
      - in: query
        name: IPN
        schema:
          type: string
        description: Filter by exact IPN (internal part number)
      - in: query
        name: IPN_regex
        schema:
          type: string
        description: Filter by regex on IPN (internal part number)
      - in: query
        name: active
        schema:
          type: boolean
      - in: query
        name: ancestor
        schema:
          type: integer
      - in: query
        name: assembly
        schema:
          type: boolean
      - in: query
        name: bom_valid
        schema:
          type: boolean
        description: BOM Valid
      - in: query
        name: cascade
        schema:
          type: boolean
        description: If true, include items in child categories of the given category
      - in: query
        name: category
        schema:
          type: integer
        description: Filter by numeric category ID or the literal 'null'
      - in: query
        name: category_detail
        schema:
          type: boolean
          default: false
      - in: query
        name: component
        schema:
          type: boolean
      - in: query
        name: convert_from
        schema:
          type: integer
      - in: query
        name: created_after
        schema:
          type: string
          format: date
        description: Updated after
      - in: query
        name: created_before
        schema:
          type: string
          format: date
        description: Updated before
      - in: query
        name: default_location
        schema:
          type: integer
        description: Default Location
      - in: query
        name: depleted_stock
        schema:
          type: boolean
        description: Depleted Stock
      - in: query
        name: exclude_id
        schema:
          type: array
          items:
            type: integer
        description: Exclude parts with these IDs (comma-separated)
        explode: false
        style: form
      - in: query
        name: exclude_related
        schema:
          type: number
        description: Exclude parts related to this part ID
      - in: query
        name: exclude_tree
        schema:
          type: integer
      - in: query
        name: has_ipn
        schema:
          type: boolean
        description: Has IPN
      - in: query
        name: has_pricing
        schema:
          type: boolean
        description: Has Pricing
      - in: query
        name: has_revisions
        schema:
          type: boolean
        description: Has Revisions
      - in: query
        name: has_stock
        schema:
          type: boolean
        description: Has stock
      - in: query
        name: has_units
        schema:
          type: boolean
        description: Has units
      - in: query
        name: in_bom_for
        schema:
          type: integer
      - in: query
        name: is_revision
        schema:
          type: boolean
        description: Is Revision
      - in: query
        name: is_template
        schema:
          type: boolean
      - in: query
        name: is_variant
        schema:
          type: boolean
        description: Is Variant
      - name: limit
        required: true
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: location_detail
        schema:
          type: boolean
          default: false
        description: Include detailed information about the stock location in the
          response
      - in: query
        name: locked
        schema:
          type: boolean
      - in: query
        name: low_stock
        schema:
          type: boolean
        description: Low stock
      - in: query
        name: name_regex
        schema:
          type: string
        description: Filter by name (regex)
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
          enum:
          - name
          - -name
          - creation_date
          - -creation_date
          - IPN
          - -IPN
          - in_stock
          - -in_stock
          - total_in_stock
          - -total_in_stock
          - unallocated_stock
          - -unallocated_stock
          - category
          - -category
          - default_location
          - -default_location
          - units
          - -units
          - pricing_min
          - -pricing_min
          - pricing_max
          - -pricing_max
          - pricing_updated
          - -pricing_updated
          - revision
          - -revision
          - revision_count
          - -revision_count
      - in: query
        name: parameters
        schema:
          type: boolean
          default: false
        description: Include part parameters in response
      - in: query
        name: path_detail
        schema:
          type: boolean
          default: false
      - in: query
        name: price_breaks
        schema:
          type: boolean
          default: false
      - in: query
        name: purchaseable
        schema:
          type: boolean
      - in: query
        name: related
        schema:
          type: number
        description: Show parts related to this part ID
      - in: query
        name: revision_of
        schema:
          type: integer
      - in: query
        name: salable
        schema:
          type: boolean
      - name: search
        required: false
        in: query
        description: 'A search term. Searched fields: IPN, category__name, description,
          keywords, manufacturer_parts__MPN, name, revision, supplier_parts__SKU,
          tags__name, tags__slug.'
        schema:
          type: string
      - in: query
        name: starred
        schema:
          type: boolean
        description: Starred
      - in: query
        name: stock_to_build
        schema:
          type: boolean
        description: Required for Build Order
      - in: query
        name: tags
        schema:
          type: boolean
          default: false
      - in: query
        name: tags_name
        schema:
          type: string
      - in: query
        name: tags_slug
        schema:
          type: string
      - in: query
        name: testable
        schema:
          type: boolean
      - in: query
        name: trackable
        schema:
          type: boolean
      - in: query
        name: unallocated_stock
        schema:
          type: boolean
        description: Unallocated stock
      - in: query
        name: variant_of
        schema:
          type: integer
        description: Variant Of
      - in: query
        name: virtual
        schema:
          type: boolean
      tags:
      - part
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:view:part
        - r:view:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPartList'
          description: ''
    post:
      operationId: part_create
      description: API endpoint for accessing a list of Part objects, or creating
        a new Part instance.
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Part'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Part'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Part'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:add:part
        - r:add:build
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Part'
          description: ''
    put:
      operationId: part_bulk_update
      description: |-
        Perform a PUT operation against this list endpoint.

        Simply redirects to the PATCH method.
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Part'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Part'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Part'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part
        - r:change:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Part'
          description: ''
    patch:
      operationId: part_bulk_partial_update
      description: |-
        Perform a PATCH operation against this list endpoint.

        Note that the typical DRF list endpoint does not support PATCH,
        so this method is provided as a custom implementation.
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPart'
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part
        - r:change:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Part'
          description: ''
  /api/part/{id}/:
    get:
      operationId: part_retrieve
      description: API endpoint for detail view of a single Part object.
      parameters:
      - in: query
        name: category_detail
        schema:
          type: boolean
          default: false
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: query
        name: location_detail
        schema:
          type: boolean
          default: false
        description: Include detailed information about the stock location in the
          response
      - in: query
        name: parameters
        schema:
          type: boolean
          default: false
        description: Include part parameters in response
      - in: query
        name: path_detail
        schema:
          type: boolean
          default: false
      - in: query
        name: price_breaks
        schema:
          type: boolean
          default: false
      - in: query
        name: tags
        schema:
          type: boolean
          default: false
      tags:
      - part
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:view:part
        - r:view:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Part'
          description: ''
    put:
      operationId: part_update
      description: API endpoint for detail view of a single Part object.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Part'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Part'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Part'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part
        - r:change:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Part'
          description: ''
    patch:
      operationId: part_partial_update
      description: API endpoint for detail view of a single Part object.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPart'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPart'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPart'
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part
        - r:change:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Part'
          description: ''
    delete:
      operationId: part_destroy
      description: API endpoint for detail view of a single Part object.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:delete:part
        - r:delete:build
      responses:
        '204':
          description: No response body
  /api/part/{id}/bom-copy/:
    post:
      operationId: part_bom_copy_create
      description: API endpoint for duplicating a BOM.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartCopyBOM'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PartCopyBOM'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PartCopyBOM'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - g:read
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartCopyBOM'
          description: ''
  /api/part/{id}/bom-validate/:
    get:
      operationId: part_bom_validate_retrieve
      description: API endpoint for 'validating' the BOM for a given Part.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:view:part
        - r:view:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartBomValidate'
          description: ''
    put:
      operationId: part_bom_validate_update
      description: API endpoint for 'validating' the BOM for a given Part.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartBomValidate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PartBomValidate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PartBomValidate'
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part
        - r:change:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartBomValidate'
          description: ''
    patch:
      operationId: part_bom_validate_partial_update
      description: API endpoint for 'validating' the BOM for a given Part.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPartBomValidate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPartBomValidate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPartBomValidate'
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part
        - r:change:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartBomValidate'
          description: ''
  /api/part/{id}/pricing/:
    get:
      operationId: part_pricing_retrieve
      description: API endpoint for viewing part pricing data.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:view:part
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartPricing'
          description: ''
    put:
      operationId: part_pricing_update
      description: API endpoint for viewing part pricing data.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PartPricing'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PartPricing'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PartPricing'
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartPricing'
          description: ''
    patch:
      operationId: part_pricing_partial_update
      description: API endpoint for viewing part pricing data.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPartPricing'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPartPricing'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPartPricing'
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartPricing'
          description: ''
  /api/part/{id}/requirements/:
    get:
      operationId: part_requirements_retrieve
      description: |-
        API endpoint detailing 'requirements' information for a particular part.

        This endpoint returns information on upcoming requirements for:

        - Sales Orders
        - Build Orders
        - Total requirements
        - How many of this part can be assembled with available stock

        As this data is somewhat complex to calculate, is it not included in the default API
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:view:part
        - r:view:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartRequirements'
          description: ''
  /api/part/{id}/serial-numbers/:
    get:
      operationId: part_serial_numbers_retrieve
      description: API endpoint for returning extra serial number information about
        a particular part.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - part
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:view:part
        - r:view:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartSerialNumber'
          description: ''
  /api/part/category/:
    get:
      operationId: part_category_list
      description: Override the GET method to determine export options.
      parameters:
      - in: query
        name: cascade
        schema:
          type: boolean
        description: Include sub-categories in filtered results
      - in: query
        name: depth
        schema:
          type: number
        description: Filter by category depth
      - in: query
        name: exclude_tree
        schema:
          type: integer
      - name: limit
        required: true
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: name
        schema:
          type: string
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
          enum:
          - name
          - -name
          - pathstring
          - -pathstring
          - level
          - -level
          - tree_id
          - -tree_id
          - lft
          - -lft
          - part_count
          - -part_count
      - in: query
        name: parent
        schema:
          type: integer
        description: Filter by parent category
      - in: query
        name: path_detail
        schema:
          type: boolean
          default: false
      - name: search
        required: false
        in: query
        description: 'A search term. Searched fields: description, name, pathstring.'
        schema:
          type: string
      - in: query
        name: starred
        schema:
          type: boolean
        description: Filter by starred categories
      - in: query
        name: structural
        schema:
          type: boolean
      - in: query
        name: top_level
        schema:
          type: boolean
        description: Filter by top-level categories
      tags:
      - part
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:view:part_category
        - r:view:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
    post:
      operationId: part_category_create
      description: |-
        API endpoint for accessing a list of PartCategory objects.

        - GET: Return a list of PartCategory objects
        - POST: Create a new PartCategory object
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Category'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Category'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:add:part_category
        - r:add:build
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    put:
      operationId: part_category_bulk_update
      description: |-
        Perform a PUT operation against this list endpoint.

        Simply redirects to the PATCH method.
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Category'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Category'
        required: true
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part_category
        - r:change:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    patch:
      operationId: part_category_bulk_partial_update
      description: |-
        Perform a PATCH operation against this list endpoint.

        Note that the typical DRF list endpoint does not support PATCH,
        so this method is provided as a custom implementation.
      tags:
      - part
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCategory'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCategory'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCategory'
      security:
      - tokenAuth: []
      - basicAuth: []
      - cookieAuth: []
      - oauth2:
        - r:change:part_category
        - r:change:build
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
  /api/part/category/{id}/:
    get:
      operationId: part_category_retrieve
      description: Custom get method to pass kwargs.
