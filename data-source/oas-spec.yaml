components:
  schemas:
    APISearchView:
      type: object
      description: Serializer for the APISearchView.
      properties:
        search:
          type: string
        search_regex:
          type: boolean
          default: false
        search_whole:
          type: boolean
          default: false
        search_notes:
          type: boolean
          default: false
        limit:
          type: integer
          default: 1
        offset:
          type: integer
          default: 0
      required:
      - search
    AcceptOverallocatedEnum:
      enum:
      - reject
      - accept
      - trim
      type: string
      description: |-
        * `reject` - Not permitted
        * `accept` - Accept as consumed by this build order
        * `trim` - Deallocate before completing this build order
    ActionPlugin:
      type: object
      description: Serializer for the ActionPluginView responses.
      properties:
        action:
          type: string
        data:
          type: object
          additionalProperties: {}
      required:
      - action
      - data
    ActionPluginError:
      type: object
      description: Serializer for the ActionPluginView error responses.
      properties:
        error:
          type: string
        action:
          type: string
      required:
      - error
    Address:
      type: object
      description: Serializer for the Address Model.
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        company:
          type: integer
          description: Select company
        title:
          type: string
          title: Address title
          description: Title describing the address entry
          maxLength: 100
        primary:
          type: boolean
          title: Primary address
          description: Set as primary address
        line1:
          type: string
          title: Line 1
          description: Address line 1
          maxLength: 50
        line2:
          type: string
          title: Line 2
          description: Address line 2
          maxLength: 50
        postal_code:
          type: string
          description: Postal code
          maxLength: 10
        postal_city:
          type: string
          title: City/Region
          description: Postal code city/region
          maxLength: 50
        province:
          type: string
          title: State/Province
          description: State or province
          maxLength: 50
        country:
          type: string
          description: Address country
          maxLength: 50
        shipping_notes:
          type: string
          title: Courier shipping notes
          description: Notes for shipping courier
          maxLength: 100
        internal_shipping_notes:
          type: string
          description: Shipping notes for internal use
          maxLength: 100
        link:
          type: string
          format: uri
          description: Link to address information (external)
          maxLength: 2000
      required:
      - company
      - pk
      - title
    AddressBrief:
      type: object
      description: Serializer for Address Model (limited).
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        line1:
          type: string
          title: Line 1
          description: Address line 1
          maxLength: 50
        line2:
          type: string
          title: Line 2
          description: Address line 2
          maxLength: 50
        postal_code:
          type: string
          description: Postal code
          maxLength: 10
        postal_city:
          type: string
          title: City/Region
          description: Postal code city/region
          maxLength: 50
        province:
          type: string
          title: State/Province
          description: State or province
          maxLength: 50
        country:
          type: string
          description: Address country
          maxLength: 50
        shipping_notes:
          type: string
          title: Courier shipping notes
          description: Notes for shipping courier
          maxLength: 100
        internal_shipping_notes:
          type: string
          description: Shipping notes for internal use
          maxLength: 100
      required:
      - pk
    AllUnitListResponse:
      type: object
      description: Serializer for the AllUnitList.
      properties:
        default_system:
          type: string
        available_systems:
          type: array
          items:
            type: string
        available_units:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Unit'
      required:
      - available_systems
      - available_units
      - default_system
    ApiToken:
      type: object
      description: Serializer for the ApiToken model.
      properties:
        created:
          type: string
          format: date-time
          readOnly: true
        expiry:
          type: string
          format: date
          title: Expiry Date
          description: Token expiry date
        id:
          type: integer
          readOnly: true
        last_seen:
          type: string
          format: date
          nullable: true
          description: Last time the token was used
        name:
          type: string
          title: Token Name
          description: Custom token name
          maxLength: 100
        token:
          type: string
          description: |-
            Provide a redacted version of the token.

            The *raw* key value should never be displayed anywhere!
          readOnly: true
        active:
          type: boolean
          description: Test if this token is active.
          readOnly: true
        revoked:
          type: boolean
          description: Token has been revoked
        user:
          type: integer
        user_detail:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        in_use:
          type: boolean
          description: Return True if the token is currently used to call the endpoint.
          readOnly: true
      required:
      - active
      - created
      - id
      - in_use
      - token
      - user_detail
    Attachment:
      type: object
      description: Serializer class for the Attachment model.
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        attachment:
          type: string
          format: uri
          nullable: true
        filename:
          type: string
        link:
          type: string
          format: uri
          nullable: true
          description: Link to external URL
          maxLength: 2000
        comment:
          type: string
          description: Attachment comment
          maxLength: 250
        upload_date:
          type: string
          format: date
          readOnly: true
        upload_user:
          type: integer
          readOnly: true
          nullable: true
          title: User
          description: User
        user_detail:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        file_size:
          type: integer
          readOnly: true
          description: File size in bytes
        model_type:
          $ref: '#/components/schemas/AttachmentModelTypeEnum'
        model_id:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - file_size
      - model_id
      - model_type
      - pk
      - upload_date
      - user_detail
    AttachmentModelTypeEnum:
      enum:
      - build
      - company
      - manufacturerpart
      - supplierpart
      - purchaseorder
      - returnorder
      - salesorder
      - salesordershipment
      - part
      - stockitem
      type: string
      description: |-
        * `build` - Build Order
        * `company` - Company
        * `manufacturerpart` - Manufacturer Part
        * `supplierpart` - Supplier Part
        * `purchaseorder` - Purchase Order
        * `returnorder` - Return Order
        * `salesorder` - Sales Order
        * `salesordershipment` - Sales Order Shipment
        * `part` - Part
        * `stockitem` - Stock Item
    Barcode:
      type: object
      description: Generic serializer for receiving barcode data.
      properties:
        barcode:
          type: string
          description: Scanned barcode data
          maxLength: 4095
      required:
      - barcode
    BarcodeAssign:
      type: object
      description: Serializer class for linking a barcode to an internal model.
      properties:
        barcode:
          type: string
          description: Scanned barcode data
          maxLength: 4095
        build:
          type: integer
          nullable: true
          title: Build Order
        manufacturerpart:
          type: integer
          nullable: true
          title: Manufacturer Part
        supplierpart:
          type: integer
          nullable: true
          title: Supplier Part
        purchaseorder:
          type: integer
          nullable: true
          title: Purchase Order
        returnorder:
          type: integer
          nullable: true
          title: Return Order
        salesorder:
          type: integer
          nullable: true
          title: Sales Order
        salesordershipment:
          type: integer
          nullable: true
          title: Sales Order Shipment
        part:
          type: integer
          nullable: true
        stockitem:
          type: integer
          nullable: true
          title: Stock Item
        stocklocation:
          type: integer
          nullable: true
          title: Stock Location
      required:
      - barcode
    BarcodeGenerate:
      type: object
      description: Serializer for generating a barcode.
      properties:
        model:
          type: string
          description: Model name to generate barcode for
        pk:
          type: integer
          description: Primary key of model object to generate barcode for
      required:
      - model
      - pk
    BarcodePOAllocate:
      type: object
      description: |-
        Serializer for allocating items against a purchase order.

        The scanned barcode could be a Part, ManufacturerPart or SupplierPart object
      properties:
        barcode:
          type: string
          description: Scanned barcode data
          maxLength: 4095
        purchase_order:
          type: integer
          description: Purchase Order to allocate items against
      required:
      - barcode
      - purchase_order
    BarcodePOReceive:
      type: object
      description: |-
        Serializer for receiving items against a purchase order.

        The following additional fields may be specified:

        - purchase_order: PurchaseOrder object to receive items against
        - location: Location to receive items into
      properties:
        barcode:
          type: string
          description: Scanned barcode data
          maxLength: 4095
        supplier:
          type: integer
          nullable: true
          description: Supplier to receive items from
        purchase_order:
          type: integer
          nullable: true
          description: PurchaseOrder to receive items against
        location:
          type: integer
          nullable: true
          description: Location to receive items into
        line_item:
          type: integer
          nullable: true
          description: Purchase order line item to receive items against
        auto_allocate:
          type: boolean
          default: true
          description: Automatically allocate stock items to the purchase order
      required:
      - barcode
    BarcodeSOAllocate:
      type: object
      description: |-
        Serializr for allocating stock items to a sales order.

        The scanned barcode must map to a StockItem object
      properties:
        barcode:
          type: string
          description: Scanned barcode data
          maxLength: 4095
        sales_order:
          type: integer
          description: Sales Order to allocate items against
        line:
          type: integer
          nullable: true
          description: Sales order line item to allocate items against
        shipment:
          type: integer
          nullable: true
          description: Sales order shipment to allocate items against
        quantity:
          type: integer
          description: Quantity to allocate
      required:
      - barcode
      - sales_order
    BarcodeScanResult:
      type: object
      description: Serializer for barcode scan results.
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        data:
          type: string
          readOnly: true
          description: Barcode data
        timestamp:
          type: string
          format: date-time
          readOnly: true
          description: Date and time of the barcode scan
        endpoint:
          type: string
          readOnly: true
          nullable: true
          title: Path
          description: URL endpoint which processed the barcode
        context:
          readOnly: true
          nullable: true
          description: Context data for the barcode scan
        response:
          readOnly: true
          nullable: true
          description: Response data from the barcode scan
        result:
          type: boolean
          readOnly: true
          description: Was the barcode scan successful?
        user:
          type: integer
          readOnly: true
          nullable: true
          description: User who scanned the barcode
        user_detail:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
      required:
      - data
      - pk
      - result
      - timestamp
      - user_detail
    BarcodeUnassign:
      type: object
      description: Serializer class for unlinking a barcode from an internal model.
      properties:
        build:
          type: integer
          nullable: true
          title: Build Order
        manufacturerpart:
          type: integer
          nullable: true
          title: Manufacturer Part
        supplierpart:
          type: integer
          nullable: true
          title: Supplier Part
        purchaseorder:
          type: integer
          nullable: true
